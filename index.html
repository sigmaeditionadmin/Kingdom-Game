<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World of Warfare</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d1117;
    color: white;
    display: flex;
    height: 100vh;
}

/* MAP AREA */
#map {
    flex: 2;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 20px;
    align-content: start;
}

.country {
    border: 2px solid #444;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
}

.country:hover {
    transform: scale(1.03);
}

.player { background: #1f6f3d; }
.ai { background: #8b1e1e; }
.defeated { background: #555 !important; }

/* SIDE PANEL */
#sidePanel {
    flex: 1;
    background: #111;
    border-left: 2px solid #333;
    display: flex;
    flex-direction: column;
}

/* STATS */
#statsPanel {
    padding: 15px;
    background: #0c0c0c;
    border-bottom: 2px solid #333;
}

/* CONTROL PANEL */
#controlPanel {
    padding: 15px;
    border-bottom: 2px solid #333;
}

#controlPanel button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    background: #1f6feb;
    color: white;
    border: none;
    cursor: pointer;
}

#controlPanel button:hover {
    background: #388bfd;
}

/* LOG */
#battleLogTitle {
    padding: 12px;
    font-weight: bold;
    border-bottom: 1px solid #333;
}

#log {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    font-size: 13px;
    background: black;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="sidePanel">
    <div id="statsPanel"></div>

    <div id="controlPanel">
        <div>Selected Target: <span id="selectedTarget">None</span></div>
        <button onclick="attack()">Attack</button>
    </div>

    <div id="battleLogTitle">Battle Log</div>
    <div id="log"></div>
</div>

<script>
let selectedCountry = null;

let countries = {
    "United States": { owner: "player", infantry: 1300000, tanks: 6000 },
    "Russia": { owner: "ai", infantry: 1000000, tanks: 5000 },
    "China": { owner: "ai", infantry: 2000000, tanks: 7000 },
    "Iran": { owner: "ai", infantry: 500000, tanks: 2000 },
    "North Korea": { owner: "ai", infantry: 400000, tanks: 1500 }
};

function renderMap() {
    const map = document.getElementById("map");
    map.innerHTML = "";

    for (let name in countries) {
        const c = countries[name];
        const div = document.createElement("div");
        div.className = "country";

        if (c.owner === "player") div.classList.add("player");
        else if (c.owner === "ai") div.classList.add("ai");
        else div.classList.add("defeated");

        div.innerHTML = `
            <strong>${name}</strong><br><br>
            Infantry: ${c.infantry.toLocaleString()}<br>
            Tanks: ${c.tanks.toLocaleString()}
        `;

        div.onclick = () => selectCountry(name);
        map.appendChild(div);
    }

    updateStats();
}

function selectCountry(name) {
    if (countries[name].owner === "ai") {
        selectedCountry = name;
        document.getElementById("selectedTarget").innerText = name;
    }
}

function attack() {
    if (!selectedCountry) return;

    const attacker = countries["United States"];
    const defender = countries[selectedCountry];

    const attackPower = attacker.infantry + attacker.tanks * 3 + Math.random() * 300000;
    const defendPower = defender.infantry + defender.tanks * 3 + Math.random() * 300000;

    if (attackPower > defendPower) {
        log("United States conquered " + selectedCountry);
        defender.owner = "defeated";
        defender.infantry = 0;
        defender.tanks = 0;
    } else {
        log("United States failed attacking " + selectedCountry);
        attacker.infantry -= 150000;
        if (attacker.infantry < 0) attacker.infantry = 0;
    }

    selectedCountry = null;
    document.getElementById("selectedTarget").innerText = "None";

    aiTurn();
    renderMap();
}

function aiTurn() {
    let player = countries["United States"];
    let aiCountries = Object.keys(countries).filter(c => countries[c].owner === "ai");

    if (aiCountries.length === 0) return;

    let attackerName = aiCountries[Math.floor(Math.random() * aiCountries.length)];
    let attacker = countries[attackerName];

    if (attacker.infantry > 300000) {
        log(attackerName + " attacked United States!");
        player.infantry -= 100000;
        if (player.infantry < 0) player.infantry = 0;
    }
}

function updateStats() {
    let player = countries["United States"];
    document.getElementById("statsPanel").innerHTML = `
        <strong>Your Military Strength</strong><br><br>
        Infantry: ${player.infantry.toLocaleString()}<br>
        Tanks: ${player.tanks.toLocaleString()}
    `;
}

function log(message) {
    const logDiv = document.getElementById("log");
    logDiv.innerHTML += message + "<br>";
    logDiv.scrollTop = logDiv.scrollHeight;
}

renderMap();
</script>

</body>
</html>
