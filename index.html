<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First-Person Aircraft Shooter</title>
<style>
  body { margin:0; overflow:hidden; background:#87ceeb; }
  canvas { display:block; background:#87ceeb; }
  #hud {
    position:absolute; top:0; left:0; width:100%; height:100%;
    pointer-events:none; color:white; font-family:sans-serif;
  }
  #crosshair {
    position:absolute; top:50%; left:50%;
    width:20px; height:20px; margin:-10px 0 0 -10px;
    border:2px solid white; border-radius:50%;
  }
  #healthBarContainer {
    position:absolute; top:10px; left:10px; width:200px; height:20px; border:2px solid white;
  }
  #healthBar { width:100%; height:100%; background:red; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="hud">
  <div id="crosshair"></div>
  <div id="healthBarContainer"><div id="healthBar"></div></div>
</div>

<script>
// ========== Canvas Setup ==========
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize',()=> {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// ========== Player ==========
const player = {
  x: canvas.width/2,
  y: canvas.height - 100,
  speed: 5,
  health: 100,
  bullets: []
};

// ========== Input ==========
const keys = {};
document.addEventListener('keydown', e=>keys[e.code]=true);
document.addEventListener('keyup', e=>keys[e.code]=false);

// ========== Enemies ==========
const enemies = [];
function spawnEnemy() {
  const enemy = {
    x: Math.random() * canvas.width,
    y: -50,
    speed: 2 + Math.random()*2,
    size: 40
  };
  enemies.push(enemy);
}

// ========== Bullets ==========
function shoot() {
  player.bullets.push({x:player.x, y:player.y-20, speed:10});
}

// ========== Game Loop ==========
let lastSpawn = 0;
function gameLoop(timestamp){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Player Movement
  if(keys['ArrowLeft'] && player.x>0) player.x -= player.speed;
  if(keys['ArrowRight'] && player.x<canvas.width) player.x += player.speed;
  if(keys['ArrowUp'] && player.y>0) player.y -= player.speed;
  if(keys['ArrowDown'] && player.y<canvas.height) player.y += player.speed;
  if(keys['Space']) shoot();

  // Draw cockpit view (simple rectangle for now)
  ctx.fillStyle = '#444';
  ctx.fillRect(0, canvas.height-100, canvas.width, 100); // cockpit floor

  // Bullets
  ctx.fillStyle = 'yellow';
  player.bullets.forEach((b, i)=>{
    b.y -= b.speed;
    ctx.fillRect(b.x-2, b.y-10, 4,10);
    if(b.y < 0) player.bullets.splice(i,1);
  });

  // Spawn Enemies
  if(timestamp - lastSpawn > 1000) { spawnEnemy(); lastSpawn = timestamp; }

  // Move & Draw Enemies
  ctx.fillStyle='red';
  enemies.forEach((e, i)=>{
    e.y += e.speed;
    ctx.fillRect(e.x-e.size/2, e.y-e.size/2, e.size, e.size);

    // Collision with bullets
    player.bullets.forEach((b,j)=>{
      if(b.x > e.x-e.size/2 && b.x < e.x+e.size/2 &&
         b.y > e.y-e.size/2 && b.y < e.y+e.size/2){
        enemies.splice(i,1);
        player.bullets.splice(j,1);
      }
    });

    // Enemy reaches player
    if(e.y+e.size/2 > canvas.height-100){
      player.health -= 10;
      enemies.splice(i,1);
    }
  });

  // Update HUD
  document.getElementById('healthBar').style.width = player.health + '%';

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>

</body>
</html>
