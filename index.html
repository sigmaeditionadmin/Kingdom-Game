<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Crown 👑 - Terrain Map</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
  }
  #battleLog {
    width: 250px;
    background-color: #1e1e1e;
    color: #fff;
    padding: 10px;
    overflow-y: auto;
    box-sizing: border-box;
  }
  #gameContainer {
    flex-grow: 1;
    position: relative;
    background: url('https://i.imgur.com/2cOaJ.png') repeat; /* terrain texture */
    background-size: cover;
    overflow: hidden;
  }
  canvas {
    position: absolute;
    left: 0;
    top: 0;
  }
  .kingdom {
    width: 40px;
    height: 40px;
    border-radius: 5px;
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    border: 2px solid #000;
    cursor: pointer;
    box-shadow: 0 0 5px rgba(0,0,0,0.5);
  }
  .player { background-color: yellow; color: #000; }
  .ally { background-color: blue; color: #fff; }
  .enemy { background-color: red; color: #fff; }
  .actionButton {
    position: absolute;
    padding: 5px 10px;
    background-color: #fff;
    border: 1px solid #000;
    cursor: pointer;
    z-index: 10;
  }
</style>
</head>
<body>
<div id="battleLog"><h3>Battle Log</h3></div>
<div id="gameContainer">
  <canvas id="arrowCanvas"></canvas>
</div>
<script>
const gameContainer = document.getElementById('gameContainer');
const battleLog = document.getElementById('battleLog');
const arrowCanvas = document.getElementById('arrowCanvas');
const ctx = arrowCanvas.getContext('2d');

arrowCanvas.width = gameContainer.clientWidth;
arrowCanvas.height = gameContainer.clientHeight;

window.addEventListener('resize', () => {
  arrowCanvas.width = gameContainer.clientWidth;
  arrowCanvas.height = gameContainer.clientHeight;
  renderKingdoms();
});

let kingdoms = [
  {id: 1, x: 50, y: 50, owner: 'player', alliances: 0},
  {id: 2, x: 250, y: 80, owner: 'enemy'},
  {id: 3, x: 100, y: 250, owner: 'enemy'},
  {id: 4, x: 300, y: 200, owner: 'enemy'},
];

let currentTurn = 'player';
let attacksThisTurn = 0;
let maxAlliances = 2;
let arrows = [];

function log(message) {
  const p = document.createElement('p');
  p.textContent = message;
  battleLog.appendChild(p);
  battleLog.scrollTop = battleLog.scrollHeight;
}

function drawArrows() {
  ctx.clearRect(0,0,arrowCanvas.width,arrowCanvas.height);
  arrows.forEach(a => {
    ctx.beginPath();
    ctx.moveTo(a.fromX+20, a.fromY+20);
    ctx.lineTo(a.toX+20, a.toY+20);
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 3;
    ctx.stroke();

    // draw arrowhead
    let angle = Math.atan2(a.toY - a.fromY, a.toX - a.fromX);
    let headlen = 10;
    ctx.beginPath();
    ctx.moveTo(a.toX+20, a.toY+20);
    ctx.lineTo(a.toX+20 - headlen*Math.cos(angle - Math.PI/6), a.toY+20 - headlen*Math.sin(angle - Math.PI/6));
    ctx.lineTo(a.toX+20 - headlen*Math.cos(angle + Math.PI/6), a.toY+20 - headlen*Math.sin(angle + Math.PI/6));
    ctx.lineTo(a.toX+20, a.toY+20);
    ctx.fillStyle = 'white';
    ctx.fill();
  });
}

function renderKingdoms() {
  gameContainer.querySelectorAll('.kingdom').forEach(k => k.remove());
  kingdoms.forEach(k => {
    const div = document.createElement('div');
    div.className = `kingdom ${k.owner}`;
    div.style.left = k.x + 'px';
    div.style.top = k.y + 'px';
    div.textContent = k.id;
    div.addEventListener('click', () => selectKingdom(k, div));
    gameContainer.appendChild(div);
  });
  drawArrows();
}

function selectKingdom(k, element) {
  document.querySelectorAll('.actionButton').forEach(b => b.remove());
  if(currentTurn !== 'player') return;
  if(k.owner === 'player' || k.owner === 'ally') {
    log(`Selected kingdom ${k.id}`);
  } else {
    const allianceBtn = document.createElement('button');
    allianceBtn.className = 'actionButton';
    allianceBtn.style.left = k.x + 'px';
    allianceBtn.style.top = (k.y - 30) + 'px';
    allianceBtn.textContent = 'Alliance';
    allianceBtn.onclick = () => requestAlliance(k);
    gameContainer.appendChild(allianceBtn);

    const attackBtn = document.createElement('button');
    attackBtn.className = 'actionButton';
    attackBtn.style.left = k.x + 'px';
    attackBtn.style.top = (k.y - 60) + 'px';
    attackBtn.textContent = 'Attack';
    attackBtn.onclick = () => attackKingdom(k);
    gameContainer.appendChild(attackBtn);
  }
}

function requestAlliance(k) {
  if(kingdoms.filter(k => k.owner === 'player' || k.owner === 'ally').length >= maxAlliances) {
    log('You must attack someone before asking for more alliances.');
    return;
  }
  const success = Math.random() < 0.5;
  if(success) {
    k.owner = 'ally';
    log(`Alliance successful with kingdom ${k.id}`);
  } else {
    log(`Alliance request denied for kingdom ${k.id}`);
  }
  renderKingdoms();
}

function attackKingdom(k) {
  const playerKingdoms = kingdoms.filter(kk => kk.owner === 'player' || kk.owner === 'ally').length;
  const enemyStrength = 1;
  const success = Math.random() < (playerKingdoms / (playerKingdoms + enemyStrength));
  if(success) {
    k.owner = 'player';
    log(`Attack successful! You conquered kingdom ${k.id}`);
  } else {
    log(`Attack failed on kingdom ${k.id}`);
  }
  arrows.push({fromX: 50, fromY: 50, toX: k.x, toY: k.y}); // temporary from first player kingdom
  setTimeout(() => { arrows.shift(); drawArrows(); }, 1000);
  attacksThisTurn++;
  renderKingdoms();
  if(attacksThisTurn >= 2) endTurn();
}

function aiTurn() {
  const aiKingdoms = kingdoms.filter(k => k.owner === 'enemy');
  if(aiKingdoms.length === 0) return;
  const target = aiKingdoms[Math.floor(Math.random() * aiKingdoms.length)];
  const success = Math.random() < 0.5;
  if(success) {
    const playerKingdoms = kingdoms.filter(k => k.owner === 'player');
    if(playerKingdoms.length > 0) {
      const targetPlayer = playerKingdoms[Math.floor(Math.random() * playerKingdoms.length)];
      targetPlayer.owner = 'enemy';
      log(`AI conquered your kingdom ${targetPlayer.id}`);
    }
  } else {
    log('AI attack failed.');
  }
}

function endTurn() {
  attacksThisTurn = 0;
  currentTurn = currentTurn === 'player' ? 'ai' : 'player';
  log(`Turn ended. Now it's ${currentTurn}'s turn.`);
  if(currentTurn === 'ai') {
    aiTurn();
    currentTurn = 'player';
    log(`Your turn.`);
    renderKingdoms();
  }
}

renderKingdoms();
</script>
</body>
</html>
